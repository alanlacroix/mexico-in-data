name: weekly-facts
# Rebuilds the deterministic facts pack that powers "What stood out" on the Brief, plus CONAPO
# demographics. The Read was deleted (Alan 2026-07-13), so the Claude drafting step is gone; this is now
# a pure deterministic refresh (no model, no cost).

on:
  schedule:
    - cron: '0 13 * * 1'   # Mondays 13:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild the facts pack (deterministic)
        working-directory: pipeline
        run: node build-analysis.js

      - name: Refresh CONAPO demographics
        working-directory: pipeline
        continue-on-error: true   # 45MB CONAPO CSV; a miss keeps last-good
        run: node build-demographics.js

      - name: Validate the facts pack against the served series
        run: node pipeline/assert-data.js

      - name: Commit the refreshed facts for review
        run: |
          git config user.name  "mexico-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/analysis/
          if git diff --cached --quiet; then
            echo "no draft change"
          else
            git commit -m "read: weekly draft $(date -u +%Y-%m-%d)"
            git push
          fi
