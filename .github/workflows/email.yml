name: build-weekly-email-review
# Sunday: refresh the news, build a DRAFT, and upload a private review artifact.
# It never commits a draft to the public site and it cannot send an email. The
# artifact contains the preview, evidence, Beehiiv handoff, and Alan's questions.
# A missing model key or failed source must remain visible in the review; fallback
# copy is never treated as a finished issue.

on:
  schedule:
    - cron: '0 20 * * 0'   # Sunday 20:00 UTC (4pm ET / 2pm Mexico City in summer)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: build-weekly-email
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh the news ledger + wire
        working-directory: pipeline
        run: node collect-news.js

      - name: Build the weekly draft
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node build-email.js

      - name: Prepare the private review package
        run: node pipeline/prepare-beehiiv.js

      - name: Upload the Sunday review
        uses: actions/upload-artifact@v4
        with:
          name: mexico-brief-sunday-review
          path: |
            data/email/
            email-preview.html
            tmp/beehiiv-review/
          if-no-files-found: error
          retention-days: 14
