name: refresh-data
# The number path — deterministic code only, no LLM. Fetches every connector,
# validates + fails closed, commits the refreshed static JSON. The public site
# (Cloudflare/GitHub Pages) redeploys on the push. IMSS is skipped here (it has
# its own monthly workflow); its ENABLE_IMSS gate keeps it off this cadence.

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours (fuel + rates + context)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run pipeline
        working-directory: pipeline
        env:
          INEGI_TOKEN: ${{ secrets.INEGI_TOKEN }}
          BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node run.js

      - name: Build the Trade section (COMTRADE + World Bank, reconciled to Banxico)
        working-directory: pipeline
        continue-on-error: true   # external APIs; reconcile-or-drop keeps last-good, never fails the run
        run: node fetch-trade.js

      - name: Build the analysis facts pack (The Read)
        working-directory: pipeline
        continue-on-error: true   # deterministic, reads local JSON; a miss keeps last-good
        run: node build-analysis.js

      - name: Log the historical vintage store (Supabase)
        working-directory: pipeline
        continue-on-error: true   # fail-soft; no-op without SUPABASE secrets, never blocks deploy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        run: node db-sync.js

      - name: Build the news wire (Q12)
        working-directory: pipeline
        continue-on-error: true   # GDELT is flaky; a miss must not fail the run — the site fail-closes
        run: node build-news.js

      - name: Collect multi-source news (RSS ledger + wire)
        working-directory: pipeline
        continue-on-error: true   # any dead feed is skipped; never fails the run
        run: node collect-news.js

      - name: Capture article bodies into the store (before links rot)
        working-directory: pipeline
        continue-on-error: true   # best-effort; a miss never fails the data run. No-op without the SUPABASE secrets.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node archive-bodies.js

      - name: Build the Tariff & USMCA Watch
        working-directory: pipeline
        continue-on-error: true   # external feed; a miss keeps last-good, never fails the run
        run: node build-tariffs.js

      - name: Build US–Mexico trade (Census)
        working-directory: pipeline
        continue-on-error: true   # external API; a miss keeps last-good, never fails the run
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: node build-trade.js

      - name: Bank today's snapshot (delta history — cannot be backfilled)
        working-directory: pipeline
        continue-on-error: true   # never fails the run
        run: node snapshot.js

      - name: Commit refreshed data
        run: |
          git config user.name  "mexico-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: scheduled refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Open issue on connector failures
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'pipeline/alerts.json';
            if (!fs.existsSync(path)) return;
            const alerts = JSON.parse(fs.readFileSync(path, 'utf8'));
            // Only escalate real errors (missing tokens are expected until set).
            const real = alerts.filter(a => a.severity === 'error' &&
              !/missing .*_TOKEN|gated by|disabled this cycle/i.test(a.message));
            if (!real.length) return;
            const body = real.map(a => `- **${a.id}** (${a.source}): ${a.message}`).join('\n');
            const title = `Data pipeline: ${real.length} connector failure(s)`;
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'data-alert',
            });
            if (open[0]) {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: open[0].number, body: `Recurred ${new Date().toISOString()}:\n${body}` });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, labels: ['data-alert'], body });
            }
