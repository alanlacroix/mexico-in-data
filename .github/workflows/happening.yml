name: happening
# The radar. Turns the committed news wire into data/happening.json — "What's happening",
# the homepage lead — using the model to SELECT, rank, and write cross-domain events
# (economy, money, politics, security, U.S.-Mexico). Separate from refresh-data (the
# deterministic number path) because this one uses the LLM. Runs ~40 min after each
# refresh so it reads a fresh wire. Fail-soft: with no ANTHROPIC_API_KEY it falls back to
# a deterministic pick and still refreshes the log; existing entries always win a dedup,
# so the hand-seeded events are never lost.

on:
  schedule:
    - cron: '57 0,6,12,18 * * *'   # 40 min after each refresh-data run (:17 every 6h)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: happening
  cancel-in-progress: false

jobs:
  happening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build the event log (What's happening)
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build-happening.js

      - name: Build the homepage brief (reads the fresh event log + board + standing)
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build-brief.js

      - name: Build the topic areas (event store projected by topic)
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node build-areas.js

      - name: Build the companies tracker (deterministic; dark until verified)
        working-directory: pipeline
        continue-on-error: true   # reads the committed log; a miss never fails the run
        run: node build-companies.js

      - name: Validate public claims and source references
        run: node pipeline/assert-data.js

      - name: Commit the event log + brief + areas
        run: |
          git config user.name  "mexico-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/happening.json data/brief.json data/areas.json data/companies.json
          if git diff --cached --quiet; then
            echo "no change to the event log or brief"
          else
            git commit -m "happening: event log + brief refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash 2>/dev/null || true
            git push
          fi
