name: release-check

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Build and validate the production artifact
        run: npm run release

      - name: Preserve the validated artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: mexico-brief-${{ github.sha }}
          path: _site/
          if-no-files-found: error
          retention-days: 14
