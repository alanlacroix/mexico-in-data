name: record-published-email

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Sent issue week, for example 2026-W29'
        required: true
        type: string
      url:
        description: 'Public Beehiiv URL for the sent edition'
        required: true
        type: string
      published_at:
        description: 'Actual Beehiiv publication time, for example 2026-07-20T08:00:00-06:00'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: record-published-email
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate and record the sent edition
        env:
          WEEK_INPUT: ${{ inputs.week }}
          URL_INPUT: ${{ inputs.url }}
          PUBLISHED_AT_INPUT: ${{ inputs.published_at }}
        run: node pipeline/record-published-email.js --week "$WEEK_INPUT" --url "$URL_INPUT" --published-at "$PUBLISHED_AT_INPUT"

      - name: Commit the published-only pointer
        run: |
          git config user.name "mexico-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add _data/latestEdition.json
          if git diff --cached --quiet; then
            echo "latest edition already recorded"
          else
            git commit -m "email: record published ${{ inputs.week }}"
            git push
          fi
