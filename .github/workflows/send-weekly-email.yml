name: prepare-beehiiv-review
# Manual, export-only handoff. This workflow cannot send an email: it has no
# provider secret and makes no provider API call. It packages one built issue for
# review and manual entry in Beehiiv's Post Builder.

on:
  workflow_dispatch:
    inputs:
      week:
        description: 'Exact issue week (for example 2026-W28)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: prepare-beehiiv-review
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate the selected issue
        env:
          WEEK_INPUT: ${{ inputs.week }}
        run: |
          case "$WEEK_INPUT" in
            [0-9][0-9][0-9][0-9]-W[0-9][0-9]) ;;
            *) echo "invalid week '$WEEK_INPUT' (expected YYYY-Www)"; exit 1 ;;
          esac

      - name: Prepare the Beehiiv review package
        env:
          WEEK_INPUT: ${{ inputs.week }}
        run: node pipeline/prepare-beehiiv.js --week "$WEEK_INPUT"

      - name: Upload the review package
        uses: actions/upload-artifact@v4
        with:
          name: beehiiv-review-${{ inputs.week }}
          path: tmp/beehiiv-review/${{ inputs.week }}/
          if-no-files-found: error
          retention-days: 14
